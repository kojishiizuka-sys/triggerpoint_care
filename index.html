<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TriggerPointMap — 原因筋マップ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#171B26">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --bg:        #171B26;
    --panel:     #1F2433;
    --panel-2:   #262C3F;
    --line:      #333B52;
    --text:      #E9E6DC;
    --text-dim:  #9099B0;
    --mark:      #C1432E;   /* trigger-point red-X */
    --mark-glow: #E86A4A;
    --sage:      #7C9885;
    --radius:    10px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans JP', system-ui, sans-serif;
    overscroll-behavior:none;
  }

  h1,h2,h3,.display{ font-family:'Zilla Slab', serif; }

  /* ---------- layout ---------- */
  #app{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
  }

  header{
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  header .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    color:var(--mark-glow);
    text-transform:uppercase;
  }
  header h1{
    margin:2px 0 0;
    font-size:22px;
    font-weight:600;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  header h1 .mark{ color:var(--mark); font-size:20px; }

  /* selectors */
  .selectors{
    padding:12px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
    flex:0 0 auto;
    border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  select{
    width:100%;
    appearance:none;
    background:var(--panel-2) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%239099B0" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 12px center;
    color:var(--text);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:11px 34px 11px 12px;
    font-size:15px;
    font-family:inherit;
  }
  select:disabled{ color:var(--text-dim); }

  /* main split: 3D + list */
  main{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  #viewer-wrap{
    position:relative;
    flex:0 0 42%;
    background:radial-gradient(ellipse at 50% 30%, #232a3d 0%, #171B26 75%);
    border-bottom:1px solid var(--line);
  }
  #viewer{ width:100%; height:100%; display:block; }
  #viewer-hint{
    position:absolute; left:12px; bottom:10px;
    font-size:11px; color:var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.03em;
  }
  #viewer-loading{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:13px;
    font-family:'IBM Plex Mono', monospace;
  }

  #list-wrap{
    flex:1 1 auto;
    overflow-y:auto;
    padding:10px 12px 90px;
    -webkit-overflow-scrolling:touch;
  }
  #list-title{
    font-size:12px;
    color:var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.08em;
    padding:6px 4px 10px;
  }
  .muscle-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    color:var(--text);
    padding:12px 12px;
    margin-bottom:8px;
    font-size:15px;
    font-family:inherit;
  }
  .muscle-row:active{ background:var(--panel-2); }
  .muscle-row .rank{
    flex:0 0 auto;
    width:22px; height:22px;
    border-radius:50%;
    border:1px solid var(--line);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-dim);
    display:flex; align-items:center; justify-content:center;
  }
  .muscle-row .name{ flex:1 1 auto; }
  .muscle-row .x-mark{
    flex:0 0 auto;
    color:var(--mark);
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:15px;
  }
  .muscle-row.selected{
    border-color:var(--mark);
    background:linear-gradient(90deg, rgba(193,67,46,.14), rgba(193,67,46,0) 70%);
  }
  .muscle-row.not-modeled .name::after{
    content:"（3D未対応）";
    color:var(--text-dim);
    font-size:11px;
    margin-left:6px;
  }

  .empty-state{
    color:var(--text-dim);
    font-size:14px;
    padding:30px 10px;
    text-align:center;
    line-height:1.7;
  }
  .empty-state .big{ font-family:'Zilla Slab',serif; font-size:17px; color:var(--text); display:block; margin-bottom:6px;}

  /* detail sheet */
  #sheet-backdrop{
    position:fixed; inset:0;
    background:rgba(10,12,18,.6);
    opacity:0; pointer-events:none;
    transition:opacity .18s ease;
    z-index:20;
  }
  #sheet-backdrop.open{ opacity:1; pointer-events:auto; }

  #sheet{
    position:fixed; left:0; right:0; bottom:0;
    background:var(--panel);
    border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;
    max-height:78vh;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform .22s cubic-bezier(.22,.68,.33,1);
    z-index:21;
    padding:10px 20px 34px;
  }
  #sheet.open{ transform:translateY(0); }
  #sheet .grabber{
    width:36px; height:4px; border-radius:2px;
    background:var(--line);
    margin:6px auto 14px;
  }
  #sheet h2{
    font-size:21px; margin:0 0 2px;
    display:flex; align-items:center; gap:8px;
  }
  #sheet h2 .x-mark{ color:var(--mark); font-family:'IBM Plex Mono',monospace; }
  #sheet .source-note{
    font-size:12px; color:var(--text-dim); margin-bottom:16px;
  }
  .care-block{ margin-bottom:16px; }
  .care-block .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; letter-spacing:.1em;
    text-transform:uppercase;
    margin-bottom:5px;
  }
  .care-block.symptom .label{ color:var(--mark-glow); }
  .care-block.cause .label{ color:var(--sage); }
  .care-block.treatment .label{ color:#8FAAE0; }
  .care-block p{ margin:0; line-height:1.75; font-size:14.5px; color:var(--text); }
  .not-modeled-note{
    font-size:12.5px; color:var(--text-dim);
    border:1px dashed var(--line);
    border-radius:8px; padding:8px 10px;
    margin-bottom:14px;
  }
  #sheet-close{
    position:absolute; top:14px; right:14px;
    width:28px; height:28px; border-radius:50%;
    background:var(--panel-2); border:1px solid var(--line);
    color:var(--text-dim); font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="eyebrow">TRIGGER POINT ATLAS</div>
    <h1><span class="mark">✕</span> TriggerPointMap</h1>
    <button id="debug-btn" style="position:absolute; top:12px; right:14px; background:var(--panel-2); color:var(--text-dim); border:1px solid var(--line); border-radius:6px; font-size:11px; padding:5px 8px;">名前一覧</button>
  </header>

  <div class="selectors">
    <select id="sel-major">
      <option value="">部位を選択してください</option>
    </select>
    <select id="sel-middle" disabled>
      <option value="">痛みの場所を選択してください</option>
    </select>
  </div>

  <div id="debug-panel" style="display:none; position:fixed; inset:0; z-index:40; background:#10131c; color:#cfd4e6; font-family:monospace; font-size:11px; padding:16px; overflow-y:auto; white-space:pre-wrap; line-height:1.6;"></div>

  <main>
    <div id="viewer-wrap">
      <canvas id="viewer"></canvas>
      <div id="viewer-loading">モデルを読み込み中…</div>
      <div id="viewer-hint">ドラッグ：回転／ピンチ：拡大縮小／タップ：詳細表示</div>
    </div>

    <div id="list-wrap">
      <div class="empty-state">
        <span class="big">部位を選んでください</span>
        上のプルダウンで大まかな部位、次に痛みの場所を選ぶと、<br>
        原因となりやすい筋肉が頻度順に一覧表示されます。
      </div>
    </div>
  </main>
</div>

<div id="sheet-backdrop"></div>
<div id="sheet">
  <div class="grabber"></div>
  <button id="sheet-close" aria-label="閉じる">✕</button>
  <h2><span class="x-mark">✕</span><span id="sheet-name"></span></h2>
  <div class="source-note" id="sheet-source"></div>
  <div id="sheet-not-modeled" class="not-modeled-note" style="display:none;"></div>
  <div class="care-block symptom">
    <div class="label">症状</div>
    <p id="sheet-symptom"></p>
  </div>
  <div class="care-block cause">
    <div class="label">原因</div>
    <p id="sheet-cause"></p>
  </div>
  <div class="care-block treatment">
    <div class="label">対処法</div>
    <p id="sheet-treatment"></p>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

(async function(){

  // ---------- data ----------
  const DATA = await fetch('data.json').then(r=>r.json());
  const categories = DATA.categories;
  const muscles = DATA.muscles;

  const selMajor = document.getElementById('sel-major');
  const selMiddle = document.getElementById('sel-middle');
  const listWrap = document.getElementById('list-wrap');

  categories.forEach(cat=>{
    const opt = document.createElement('option');
    opt.value = cat.id; opt.textContent = cat.name;
    selMajor.appendChild(opt);
  });

  function resetMiddle(){
    selMiddle.innerHTML = '<option value="">痛みの場所を選択してください</option>';
    selMiddle.disabled = true;
  }
  resetMiddle();

  function renderEmpty(msg, sub){
    listWrap.innerHTML = `<div class="empty-state"><span class="big">${msg}</span>${sub||''}</div>`;
  }

  selMajor.addEventListener('change', ()=>{
    resetMiddle();
    clearHighlight();
    const cat = categories.find(c=>c.id===selMajor.value);
    if(!cat){ renderEmpty('部位を選んでください','上のプルダウンで大まかな部位、次に痛みの場所を選ぶと、<br>原因となりやすい筋肉が頻度順に一覧表示されます。'); return; }
    cat.locations.forEach(loc=>{
      const opt = document.createElement('option');
      opt.value = loc.id; opt.textContent = loc.name;
      selMiddle.appendChild(opt);
    });
    selMiddle.disabled = false;
    renderEmpty('痛みの場所を選んでください','');
  });

  selMiddle.addEventListener('change', ()=>{
    clearHighlight();
    const cat = categories.find(c=>c.id===selMajor.value);
    const loc = cat && cat.locations.find(l=>l.id===selMiddle.value);
    if(!loc){ renderEmpty('痛みの場所を選んでください',''); return; }
    renderMuscleList(loc.muscles);
  });

  let currentMuscleNames = [];

  function renderMuscleList(names){
    currentMuscleNames = names;
    listWrap.innerHTML = '';
    const title = document.createElement('div');
    title.id = 'list-title';
    title.textContent = `原因筋（頻度順・${names.length}）`;
    listWrap.appendChild(title);

    names.forEach((name, i)=>{
      const m = muscles[name];
      const row = document.createElement('button');
      row.className = 'muscle-row' + (m.notModeled ? ' not-modeled' : '');
      row.dataset.name = name;
      row.innerHTML = `<span class="rank">${i+1}</span><span class="name">${name}</span><span class="x-mark">✕</span>`;
      row.addEventListener('click', ()=>selectMuscle(name));
      listWrap.appendChild(row);
    });
  }

  function selectMuscle(name){
    document.querySelectorAll('.muscle-row').forEach(r=>{
      r.classList.toggle('selected', r.dataset.name===name);
    });
    highlightMuscle(name);
    openSheet(name);
  }

  // ---------- detail sheet ----------
  const sheet = document.getElementById('sheet');
  const sheetBackdrop = document.getElementById('sheet-backdrop');
  const sheetName = document.getElementById('sheet-name');
  const sheetSource = document.getElementById('sheet-source');
  const sheetNotModeled = document.getElementById('sheet-not-modeled');
  const sheetSymptom = document.getElementById('sheet-symptom');
  const sheetCause = document.getElementById('sheet-cause');
  const sheetTreatment = document.getElementById('sheet-treatment');

  function openSheet(name){
    const m = muscles[name];
    sheetName.textContent = name;
    sheetSource.textContent = m.careSource ? `${m.careSource} の情報を表示しています` : '';
    sheetSource.style.display = m.careSource ? 'block' : 'none';
    if(m.notModeled){
      sheetNotModeled.style.display = 'block';
      sheetNotModeled.textContent = 'このアプリの3DモデルにはZ-Anatomy上に単独オブジェクトが存在しないため、3D表示には対応していません。';
    } else {
      sheetNotModeled.style.display = 'none';
    }
    sheetSymptom.textContent = m.symptom || '—';
    sheetCause.textContent = m.cause || '—';
    sheetTreatment.textContent = m.treatment || '—';
    sheet.classList.add('open');
    sheetBackdrop.classList.add('open');
  }
  function closeSheet(){
    sheet.classList.remove('open');
    sheetBackdrop.classList.remove('open');
  }
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  sheetBackdrop.addEventListener('click', closeSheet);

  // ---------- 3D viewer ----------
  const canvas = document.getElementById('viewer');
  const wrap = document.getElementById('viewer-wrap');
  const loadingEl = document.getElementById('viewer-loading');

  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
  camera.position.set(0, 1.4, 3.4);

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const key = new THREE.DirectionalLight(0xffffff, 0.9);
  key.position.set(2,4,3);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x8fa0d0, 0.4);
  rim.position.set(-3,1,-2);
  scene.add(rim);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0,1.0,0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 0.6;
  controls.maxDistance = 8;

  function resize(){
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w,h,false);
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  const DIM_OPACITY = 0.16;
  let allMeshes = [];
  const loadedRoots = []; // top-level glTF scene roots
  let nameGroups = null; // normalized base name -> mesh[]

  function normalizeName(raw){
    if(!raw) return '';
    return raw
      .replace(/\.[rl]\d*$/i, '')   // strip trailing .r / .l (possibly with a number) from expected names
      .replace(/_\d+$/, '')          // strip Blender's auto dedup suffix (_1, _2, ...) from loaded names
      .replace(/[_\s]+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function buildNameGroups(){
    nameGroups = {};
    allMeshes.forEach(mesh=>{
      const key = normalizeName(mesh.name);
      if(!key) return;
      (nameGroups[key] = nameGroups[key] || []).push(mesh);
    });
  }

  function meshesForObjectName(objName){
    if(!nameGroups) buildNameGroups();
    return nameGroups[normalizeName(objName)] || [];
  }

  function dimAll(){
    allMeshes.forEach(mesh=>{
      mesh.material.opacity = DIM_OPACITY;
      mesh.material.transparent = true;
      mesh.material.emissive && mesh.material.emissive.setHex(0x000000);
      if(mesh.userData.origColor) mesh.material.color.copy(mesh.userData.origColor);
    });
  }
  function clearHighlight(){
    dimAll();
    renderer.render(scene, camera);
  }

  function highlightMuscle(name){
    const m = muscles[name];
    dimAll();
    const hintEl = document.getElementById('viewer-hint');
    if(!m.notModeled){
      let foundMeshCount = 0;
      let resolvedNameCount = 0;
      m.objectNames.forEach(objName=>{
        const meshes = meshesForObjectName(objName);
        if(meshes.length) resolvedNameCount++;
        meshes.forEach(mesh=>{
          foundMeshCount++;
          mesh.material.opacity = 1.0;
          mesh.material.transparent = true;
          if(mesh.material.emissive) mesh.material.emissive.setHex(0xC1432E);
          if(mesh.material.emissiveIntensity !== undefined) mesh.material.emissiveIntensity = 0.35;
          if(mesh.material.color) mesh.material.color.set(0xC1432E);
        });
      });
      hintEl.textContent = `[debug] ${name}: 対象名${m.objectNames.length}件中${resolvedNameCount}件解決 / メッシュ${foundMeshCount}個ハイライト（全メッシュ数:${allMeshes.length}）`;
      if(foundMeshCount===0){
        console.warn('[TriggerPointMap] 3Dオブジェクトが見つかりません:', name, m.objectNames);
      }
    } else {
      hintEl.textContent = `[debug] ${name}: このアプリの3Dモデルには存在しません`;
    }
  }

  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  function resolveMuscleFromHit(hitObject){
    let node = hitObject;
    while(node){
      const key = normalizeName(node.name);
      if(key){
        const found = currentMuscleNames.find(name=>{
          const mo = muscles[name];
          return !mo.notModeled && mo.objectNames.some(o=>normalizeName(o)===key);
        });
        if(found) return found;
      }
      node = node.parent;
    }
    return null;
  }
  function onPointerTap(ev){
    const rect = canvas.getBoundingClientRect();
    const cx = (ev.changedTouches ? ev.changedTouches[0].clientX : ev.clientX);
    const cy = (ev.changedTouches ? ev.changedTouches[0].clientY : ev.clientY);
    pointer.x = ((cx-rect.left)/rect.width)*2-1;
    pointer.y = -((cy-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(allMeshes, false);
    if(hits.length===0) return;
    const found = resolveMuscleFromHit(hits[0].object);
    if(found) selectMuscle(found);
  }
  canvas.addEventListener('click', onPointerTap);

  const loader = new GLTFLoader();

  function loadGlb(path){
    return new Promise((resolve)=>{
      loader.load(path, (gltf)=>resolve(gltf), undefined, ()=>resolve(null));
    });
  }

  function registerModel(gltf){
    if(!gltf) return;
    const model = gltf.scene;
    model.traverse(obj=>{
      if(obj.isMesh){
        obj.material = obj.material.clone();
        obj.material.transparent = true;
        obj.material.opacity = DIM_OPACITY;
        if(obj.material.color) obj.userData.origColor = obj.material.color.clone();
        allMeshes.push(obj);
      }
    });
    loadedRoots.push(model);
    scene.add(model);
  }

  (async function loadAll(){
    const main = await loadGlb('triggerpoint_muscles.glb');
    if(!main){
      loadingEl.textContent = '3Dモデル（triggerpoint_muscles.glb）を読み込めませんでした';
      return;
    }
    registerModel(main);
    // optional patch file with later-added objects; silently skipped if absent
    const patch = await loadGlb('triggerpoint_patch.glb');
    registerModel(patch);

    const box = new THREE.Box3();
    allMeshes.forEach(m=>box.expandByObject(m));
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    controls.target.copy(center);
    camera.position.set(center.x, center.y + size.y*0.1, center.z + Math.max(size.x,size.y,size.z)*1.6);

    loadingEl.style.display = 'none';
    resize();
    animate();

    // diagnostic: confirm how many of the needed objects actually resolved by name
    const allNeeded = new Set();
    Object.values(muscles).forEach(m => m.objectNames.forEach(o=>allNeeded.add(o)));
    let hit = 0;
    allNeeded.forEach(o => { if(meshesForObjectName(o).length) hit++; });
    console.log(`[TriggerPointMap] 3Dオブジェクト一致: ${hit} / ${allNeeded.size}`);
    if(hit === 0 && allNeeded.size > 0){
      document.getElementById('viewer-hint').textContent =
        `⚠ 3Dオブジェクト名が一致していません（0/${allNeeded.size}）。glb書き出し設定をご確認ください。`;
    }

    document.getElementById('debug-btn').addEventListener('click', ()=>{
      const panel = document.getElementById('debug-panel');
      if(panel.style.display === 'block'){ panel.style.display = 'none'; return; }

      const loadedNames = new Set();
      allMeshes.forEach(m=>{ if(m.name) loadedNames.add(m.name); });
      let n = 0;
      loadedRoots.forEach(root=>root.traverse(o=>{ n++; }));

      const missing = [...allNeeded].filter(x=>meshesForObjectName(x).length===0);

      let out = '';
      out += `読み込んだ全ノード数: ${n}\n`;
      out += `読み込んだメッシュ数: ${allMeshes.length}\n`;
      out += `名前付きメッシュの種類数(重複除く): ${loadedNames.size}\n`;
      out += `必要なオブジェクト名の総数: ${allNeeded.size}\n`;
      out += `一致した数（正規化後）: ${allNeeded.size - missing.length}\n\n`;
      out += `--- 見つからなかった名前（正規化しても一致しない） ---\n`;
      out += missing.slice(0,60).join('\n');
      if(missing.length>60) out += `\n...ほか${missing.length-60}件`;
      out += `\n\n--- 実際に読み込まれたメッシュの名前（先頭80件） ---\n`;
      out += [...loadedNames].sort().slice(0,80).join('\n');

      panel.textContent = out;
      panel.style.display = 'block';
    });
  })();

  function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  resize();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
